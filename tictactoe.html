<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game! 🎮</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="tictactoe.css">
</head>
<body>
    <div class="magic-sparkles"></div>
    <div class="floating-hearts"></div>

    <div class="container">
        <div class="title-section">
            <h1>Tic-Tac-Toe Challenge! 🎮</h1>
            <p>You are X! Get three in a row to win!</p>
        </div>

        <div class="game-section">
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </div>

        <div class="message-section">
            <div id="gameMessage" class="game-message">Your turn! Click a cell.</div>
        </div>

        <button class="reset-button" id="resetBtn">Play Again</button>
    </div>

    <div class="win-modal" id="winModal">
        <div class="win-content">
            <h2>Congrats! 🎉</h2>
            <p>You won the Tic-Tac-Toe game!</p>
            <button class="modal-button" id="winCloseBtn">Awesome! 💕</button>
        </div>
    </div>

    <script src="tictactoe.js"></script>
</body>
</html>
